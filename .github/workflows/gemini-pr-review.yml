name: Gemini PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull Request number to review'
        required: true
        type: string
      model_name:
        description: 'Gemini model to use'
        required: false
        default: 'gemini-2.5-flash'
        type: choice
        options:
          - gemini-2.5-flash
          - gemini-2.0-flash
          - gemini-1.5-flash
          - gemini-2.5-pro
          - gemini-1.5-pro

# Ensure we have permissions to read repository content and write pull request comments
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Gemini PR Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_NUMBER: ${{ inputs.pr_number || github.event.pull_request.number }}
          MODEL_NAME: ${{ inputs.model_name || 'gemini-2.5-flash' }}
        run: node .github/scripts/gemini-pr-review.js
